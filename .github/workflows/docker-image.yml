name: Build Temaki Sprite And Upload To Google Drive

on:
  workflow_dispatch:

jobs:
  build-sprite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # 1. 快速安装 spreet（直接下载官方编译好的二进制文件，免去安装 Rust 和漫长的编译）
      - name: Install spreet
        run: |
          SPREET_VERSION="0.11.0" # 你可以根据 spreet 官方 release 调整版本
          curl -L -o spreet.tar.gz "https://github.com/charlie-goodman/spreet/releases/download/v${SPREET_VERSION}/spreet_${SPREET_VERSION}_Linux_x86_64.tar.gz"
          tar -xvf spreet.tar.gz
          sudo mv spreet /usr/local/bin/
          spreet --version

      # 2. 拉取 Temaki
      - name: Clone Temaki Icons
        run: |
          git clone https://github.com/rapideditor/temaki.git

      # 3. 生成 sprite (同时生成标准和 @2x 高清版)
      - name: Build Sprite
        run: |
          mkdir -p output
          # 生成标准版 sprite.json / sprite.png
          spreet temaki/icons output/sprite
          # 生成高清版 sprite@2x.json / sprite@2x.png
          spreet --retina temaki/icons output/sprite@2x

      # 4. 查看结果
      - name: List Output
        run: |
          ls -lah output

      # 5. 压缩编译好的结果
      - name: Compress Sprite
        run: |
          zip -r temaki-sprite.zip output/

      # 6. 安装 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 7. 配置 rclone
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FSXEDX_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 8. 上传编译后的压缩包
      - name: Upload Sprite
        run: |
          rclone mkdir Google:/temaki || true
          rclone copy temaki-sprite.zip Google:/temaki/

      # 9. 验证
      - name: Verify Upload
        run: |
          rclone lsf Google:/temaki/
