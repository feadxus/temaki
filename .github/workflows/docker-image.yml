name: Build Temaki Sprite And Upload To Google Drive

on:
  workflow_dispatch:

jobs:
  build-sprite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # =========================================================
      # 1. 自动从 GitHub Release 下载最新的 spreet 二进制文件
      # =========================================================
      - name: Download Spreet Binary
        uses: robinraju/release-downloader@v1.13
        with:
          repository: "charlie-goodman/spreet"
          latest: true
          # 自动匹配 Linux x86_64 架构的文件
          fileName: "*Linux_x86_64.tar.gz" 
          out-file-path: "spreet_install"

      # =========================================================
      # 2. 解压并配置 spreet 环境变量
      # =========================================================
      - name: Install spreet
        run: |
          cd spreet_install
          tar -xvf *.tar.gz
          sudo mv spreet /usr/local/bin/
          spreet --version

      # =========================================================
      # 3. 拉取 Temaki 图标库
      # =========================================================
      - name: Clone Temaki Icons
        run: |
          git clone https://github.com/rapideditor/temaki.git

      # =========================================================
      # 4. 生成 sprite（完美支持标准与 2x 高清分辨率）
      # =========================================================
      - name: Build Sprite
        run: |
          mkdir -p output
          # 生成一倍图
          spreet temaki/icons output/sprite
          # 生成两倍图（供高清屏、视网膜屏使用）
          spreet --retina temaki/icons output/sprite@2x

      # 5. 查看编译出的结果（确认 sprite.json/png 存在）
      - name: List Output
        run: |
          ls -lah output

      # 6. 压缩结果
      - name: Compress Sprite
        run: |
          zip -r temaki-sprite.zip output/

      # 7. 安装 rclone
      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # 8. 配置 rclone
      - name: Setup rclone config
        env:
          RCLONE_SECRET_DATA: ${{ secrets.GOOGLE_FSXEDX_DRIVE }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_SECRET_DATA" > ~/.config/rclone/rclone.conf

      # 9. 传输到 Google Drive
      - name: Upload Sprite
        run: |
          rclone mkdir Google:/temaki || true
          rclone copy temaki-sprite.zip Google:/temaki/

      # 10. 验证网盘内文件
      - name: Verify Upload
        run: |
          rclone lsf Google:/temaki/
